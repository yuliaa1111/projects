# python -m ret_pred.main --config ret_pred/config_train_rankic_refit_yzscore.yaml

task:
  mode: "train"
  type: "regression"
  label_col: "y"
  seed: 42

logging:
  level: INFO
  log_dir: "{run_dir}/logs/train"
  filename: "train.log"
  max_bytes: 10485760
  backup_count: 100
  fmt: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  datefmt: "%Y-%m-%d %H:%M:%S"
  console: true

paths:
  runs_root: "/home/quant/projects/ret_pred/runs"
  run_id: "exp_rankic_refit_001"
  run_dir: "{runs_root}/{run_id}"
  preprocess_dir: "{run_dir}/preprocess"
  model_dir: "{run_dir}/model"
  pred_dir: "{run_dir}/preds"
  eval_dir: "{run_dir}/eval"

dataloader:
  source: "parquet_dir"
  date_col: "date"
  stockid_col: "stockid"

  # multi-long input (column-sharded long chunks)
  long_paths:
    - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_0_100.parquet"
    - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_100_200.parquet"
    - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_200_300.parquet"
    - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_300_400.parquet"
    - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_400_500.parquet"
    - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_500_600.parquet"
    - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_600_700.parquet"
  long_merge_how: "inner"
  lowmem:
    enabled: true
    chunk_days: 20
    cast_float32: true
    temp_dir: "{run_dir}/tmp_dataloader"
    output_path: "{run_dir}/tmp_dataloader/merged_long.parquet"

  # keep [] so stage-2 preplan can inject union pool
  fields: []
  label_name: "y"
  date_start: "2026-01-04"
  date_end: "2026-02-27"

  # base candidate pool for preplan union
  feature_mask_csv: null
  feature_col_name: "feature"
  feature_use_col: "use"

  build_label: true
  label_price_col: "open_1d"
  label_log_return: false

  label_postprocess: #对y做zscore和winsorize
    enabled: true
    keep_y_raw: false
    rank_by_date:                  # 新增：y raw 生成后按日做rank
      enabled: true
      pct: true
      centered: false
      ties_method: "average"
      na_option: "keep"
    zscore_by_date:
      enabled: false
      ddof: 0
      eps: 1.0e-12
      clip: [-5, 5]     # 新增：zscore后先做硬截断
    winsorize_by_date:
      enabled: false
      lower_q: 0.05
      upper_q: 0.95


feature_engineering:  #特征工程
  enabled: false
  rolling_stats:
    enabled: true
    windows: [5, 10, 20]
    stats: ["mean", "std"]
    min_periods: 1

preprocess:
  date_col: "date"
  stockid_col: "stockid"
  label_col: "y"

  # set >1.0 to avoid dropping selected factors by NaN ratio
  col_drop_threshold: 1.01
  row_drop_threshold: 0.20

  nan_policy: "tree_friendly"
  do_fill_for_tree: false
  fill_method: "ffill_then_zero"
  ffill_limit: 5

  add_missing_mask: false

  winsorize:
    enabled: true
    by: "date"
    lower_q: 0.01
    upper_q: 0.99

  zscore:
    enabled: true
    by: "date"
    method: "standard" # robust是稳健mad
    ddof: 0
    clip: null
    robust:
      eps: 1.0e-12
      use_06745: false

  save_parquet: true
  save_path: "{preprocess_dir}/preprocessed_{mode}_{label}_{date_start}_{date_end}.parquet"
  save_state_json: true
  state_path: "{model_dir}/preprocess_state_fit_{label}_{date_start}_{date_end}.json"

  chunked:                     # 新增：分块 preprocess，降低内存峰值
    enabled: true
    chunk_days: 20
    nan_scan_block_size: 64
    cast_float32: true

datacutting:
  date_col: "date"
  stockid_col: "stockid"
  label_col: "y"
  weight_col: null
  feature_cols: null
  return_dataframe_X: true

  cache:
    enabled: false
    mode: "parquet_long"
    dir: "{run_dir}/cut"
    file_tpl: "{model}_{part}_fold{fold}.parquet"
    meta_tpl: "{model}_{part}_fold{fold}_meta.json"
    npz_tpl: "{model}_{part}_fold{fold}.npz"
    keys_tpl: "{model}_{part}_fold{fold}_keys.parquet"

  seq_len: 60
  incomplete_policy: "drop"
  pad_side: "left"
  min_len_to_keep: 1
  return_mask: true
  mask_dtype: "bool"
  strict_check_nan: false

model:
  family: "tree"
  name: "lgbm"
  candidates:
    lgbm:
      verbosity: -1
      objective: "regression"
      n_estimators: 800
      learning_rate: 0.05
      num_leaves: 63
      max_depth: -1
      min_data_in_leaf: 200
      feature_fraction: 0.8
      bagging_fraction: 0.8
      bagging_freq: 1
      lambda_l1: 0.0
      lambda_l2: 1.0
      min_gain_to_split: 0.0
      random_state: 42
      n_jobs: -1


trainer:
  name: "sweep_rankic_refit_roll"  #原版rankic_refit_roll只会跑一组参数
  params:
    metric: "rankic"
    maximize: true
    device: "cpu"

    # windowing:
    #   mode: "days"
    #   initial_train_days: 252
    #   eval_test_days: 5
    #   prediction_horizon_days: 1
    #   step_days: null    # null = 默认等于 prediction_horizon_ratio
    #   expanding_train: true
    #   max_train_days: null

    windowing:  # 测试用
      mode: "days"
      initial_train_days: 15
      eval_test_days: 3
      prediction_horizon_days: 1
      step_days: null
      expanding_train: true
      max_train_days: null

    # ratio版：
    # windowing:
    #   mode: "ratio"
    #   initial_train_ratio: 0.70
    #   eval_test_ratio: 0.05
    #   prediction_horizon_ratio: 0.01
    #   step_ratio: null                  # null = 默认等于 prediction_horizon_ratio
    #   min_initial_train_days: 20
    #   min_eval_test_days: 3
    #   min_prediction_horizon_days: 1
    #   expanding_train: true
    #   max_train_days: null

    factor_selection:
      enabled: true
      preplan_union_to_dataloader: true    # 预规划并集写回 dataloader.fields，减少读取列
      selection_mode: "single_day_threshold"   # single_day_threshold单日筛选而不是历史聚合| historical_aggregate
      train_test_anchor: "train_start"         # train_start | train_end | test_start test_end | future_start | future_end

      future_anchor: "future_start"   # future 阶段在 future 第一天重选因子
      future_reselect: true
      predictions_pkl_path: "/home/quant/projects/predictions.pkl"
      rankic_threshold: 0.03    # 单日阈值规则：abs(rankic) >= rankic_threshold

      # 下面三个参数在 historical_aggregate 模式才生效，保留兼容
      # aggregate: "abs_mean"
      # cutoff_inclusive: true
      # min_history_days: 1
      # 某次筛选为空时策略
      empty_selection_policy: "fallback_base_pool"   # fallback_base_pool | skip_window

    sample_weighting:              # 新增：样本加权（近期+极端y，可交叉）
      enabled: true
      recency:
        enabled: true
        mode: "exp"               # exp | linear
        half_life_days: 63
        min_weight: 0.2
        max_weight: 1.0
      tail_y:
        enabled: true
        side: "both"              # both | upper | lower
        scope: "date"      # global | date
        lower_q: 0.1
        upper_q: 0.9
        tail_weight: 2.0
        mid_weight: 1.0
      combine: "multiply"         # multiply | add | max
      normalize: "mean1"          # mean1 | none

    saver:
      enabled: true
      params:
        dir: "{pred_dir}"
        save_parts: ["train", "test", "future"]
        file_tpl: "window{fold:04d}_{part}.parquet"


sweep:
  id_prefix: "lgbm"
  merge_with_base: true
  param_sets:
    - id: "lgbm_04"
      model:
        family: "tree"
        name: "lgbm"
        params:
          learning_rate: 0.05
          n_estimators: 1200
          num_leaves: 63
          max_depth: 4
          min_data_in_leaf: 200
          feature_fraction: 0.8
          bagging_fraction: 0.8
          bagging_freq: 1
          lambda_l2: 1.0
          min_gain_to_split: 0.0

    - id: "lgbm_05"
      model:
        family: "tree"
        name: "lgbm"
        params:
          learning_rate: 0.01
          n_estimators: 4000
          num_leaves: 63
          max_depth: -1
          min_data_in_leaf: 200
          feature_fraction: 0.8
          bagging_fraction: 0.8
          bagging_freq: 1
          lambda_l2: 1.0
          min_gain_to_split: 0.0


evaluate:
  params:
    task: "regression"
    pred_dir: "{pred_dir}"
    out_dir: "{eval_dir}"
    parts: ["train", "test", "future"]
    date_col: "date"
    stockid_col: "stockid"

    load_cast_float32: true      # 新增：评估读盘降内存
    load_part_as_category: true  # 新增：part 列压缩
    plot_max_rows: 300000        # 新增：大样本绘图抽样上限
    plot_sample_seed: 42         # 新增：绘图抽样随机种子

    future_concat:
      enabled: true
      future_part: "future"
      out_subdir: "future"
      preds_filename: "future_preds_all.parquet"
      validate_no_overlap: true
      save_fig: true

    factor_eval:
      enabled: true
      strategy: "rankic_refit_roll"
      input_source: "auto"   # rankic_refit_roll 下会解析到future_stitched
      value_col: "y_pred"    # 等价你旧脚本 value_col="y_pred"

      out_dir: "{eval_dir}/factor_eval_{strategy}_{source_tag}"
      source_tag: "future_preds"
      excess_mode: "both"
      excess_output_layout: "separate_dirs"
      meta_filename: "factor_eval_meta.json"

      analysis_params:
        factor_name: "pred_future"

        # 必填：你旧脚本里的 complete_factor_analysis 参数
        start_date: 2025-01-01
        end_date: 2026-03-01
        frequency: 1
        factor_direction: "positive"
        portfolio_type: "long_only"
        long_groups: [9, 10]
        short_groups: [1, 2]
        group_num: 10
        neutralize: false
        save_figures: true
        return_data: true
        verbose: true
        eval_price: "open"
        enable_turnover_fee: true
        turnover_fee_rate: 0.00045

