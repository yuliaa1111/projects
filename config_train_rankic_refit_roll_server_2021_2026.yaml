task:
  mode: "train"
  type: "regression"
  label_col: "y"
  seed: 42

logging:
  level: INFO
  log_dir: "{run_dir}/logs/train"
  filename: "train.log"
  max_bytes: 10485760
  backup_count: 100
  fmt: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  datefmt: "%Y-%m-%d %H:%M:%S"
  console: true

paths:
  runs_root: "/home/quant/projects/ret_pred/runs"
  run_id: "exp_rankic_refit_roll_2021_2026"
  run_dir: "{runs_root}/{run_id}"
  preprocess_dir: "{run_dir}/preprocess"
  model_dir: "{run_dir}/model"
  pred_dir: "{run_dir}/preds"
  eval_dir: "{run_dir}/eval"

dataloader:
  source: "parquet_dir"
  date_col: "date"
  stockid_col: "stockid"

  # multi-long input (column-sharded long chunks)
  long_paths:
    - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_0_100.parquet"
    - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_100_200.parquet"
    - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_200_300.parquet"
    - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_300_400.parquet"
    - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_400_500.parquet"
    - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_500_600.parquet"
    - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_600_700.parquet"
  long_merge_how: "inner"

  # keep [] so stage-2 preplan can inject union pool
  fields: []
  label_name: "y"
  date_start: "2021-01-04"
  date_end: "2026-02-27"

  # base candidate pool for preplan union
  feature_mask_csv: "/home/quant/projects/factors_2021_2026_from_predictions/field_mask.csv"
  feature_col_name: "feature"
  feature_use_col: "use"

  build_label: true
  label_price_col: "open_1d"
  label_log_return: false

  label_postprocess:
    enabled: false
    keep_y_raw: false
    rank_by_date:
      enabled: false
      pct: true
      centered: false
      ties_method: "average"
      na_option: "keep"
    zscore_by_date: { enabled: true, ddof: 0, eps: 1.0e-12 }
    winsorize_by_date: { enabled: true, lower_q: 0.05, upper_q: 0.95 }

feature_engineering:
  enabled: false
  rolling_stats:
    enabled: true
    windows: [5, 10, 20]
    stats: ["mean", "std"]
    min_periods: 1

preprocess:
  date_col: "date"
  stockid_col: "stockid"
  label_col: "y"

  # set >1.0 to avoid dropping selected factors by NaN ratio
  col_drop_threshold: 1.01
  row_drop_threshold: 0.20

  nan_policy: "tree_friendly"
  do_fill_for_tree: false
  fill_method: "ffill_then_zero"
  ffill_limit: 5

  add_missing_mask: false

  winsorize:
    enabled: true
    by: "date"
    lower_q: 0.01
    upper_q: 0.99

  zscore:
    enabled: false
    by: "date"
    method: "standard"
    ddof: 0
    clip: null
    robust:
      eps: 1.0e-12
      use_06745: false

  save_parquet: true
  save_path: "{preprocess_dir}/preprocessed_{mode}_{label}_{date_start}_{date_end}.parquet"
  save_state_json: true
  state_path: "{model_dir}/preprocess_state_fit_{label}_{date_start}_{date_end}.json"

datacutting:
  date_col: "date"
  stockid_col: "stockid"
  label_col: "y"
  weight_col: null
  feature_cols: null
  return_dataframe_X: true

  cache:
    enabled: false
    mode: "parquet_long"
    dir: "{run_dir}/cut"
    file_tpl: "{model}_{part}_fold{fold}.parquet"
    meta_tpl: "{model}_{part}_fold{fold}_meta.json"
    npz_tpl: "{model}_{part}_fold{fold}.npz"
    keys_tpl: "{model}_{part}_fold{fold}_keys.parquet"

  seq_len: 60
  incomplete_policy: "drop"
  pad_side: "left"
  min_len_to_keep: 1
  return_mask: true
  mask_dtype: "bool"
  strict_check_nan: false

model:
  family: "tree"
  name: "lgbm"
  candidates:
    lgbm:
      verbosity: -1
      objective: "regression"
      n_estimators: 800
      learning_rate: 0.05
      num_leaves: 63
      max_depth: -1
      min_data_in_leaf: 200
      feature_fraction: 0.8
      bagging_fraction: 0.8
      bagging_freq: 1
      lambda_l1: 0.0
      lambda_l2: 1.0
      min_gain_to_split: 0.0
      random_state: 42
      n_jobs: -1

trainer:
  name: "rankic_refit_roll"
  params:
    metric: "rankic"
    maximize: true
    device: "cpu"

    windowing:
      mode: "days"
      initial_train_days: 252
      eval_test_days: 20
      prediction_horizon_days: 5
      step_days: null
      expanding_train: false

      max_train_days: null

    factor_selection:
      enabled: true
      source: factor_use_flags_csv
      factor_use_flags_csv_path: "/home/quant/projects/ret_pred/factor_use_flags_v1_new_use.csv"
      selection_scope: future_only_single_set
      future_anchor: future_start
      # source: predictions_pkl
      # predictions_pkl_path: "/home/quant/projects/predictions.pkl"
      preplan_union_to_dataloader: true
      selection_mode: "single_day_threshold"
      train_test_anchor: "train_start"
      future_reselect: true
      rankic_threshold: 0.03
      aggregate: "abs_mean"
      cutoff_inclusive: true
      min_history_days: 1
      empty_selection_policy: "fallback_base_pool"

    sample_weighting:
      enabled: false
      recency:
        enabled: false
        mode: "exp"
        half_life_days: 63
        min_weight: 0.2
        max_weight: 1.0
      tail_y:
        enabled: false
        scope: "global"
        side: "both"
        lower_q: 0.1
        upper_q: 0.9
        tail_weight: 2.0
        mid_weight: 1.0
      combine: "multiply"
      normalize: "mean1"

    saver:
      enabled: true
      params:
        dir: "{pred_dir}"
        save_parts: ["test", "future"]
        file_tpl: "window{fold:04d}_{part}.parquet"

evaluate:
  params:
    task: "regression"
    pred_dir: "{pred_dir}"
    out_dir: "{eval_dir}"
    parts: ["test", "future"]
    date_col: "date"
    stockid_col: "stockid"

    future_concat:
      enabled: true
      future_part: "future"
      out_subdir: "future"
      preds_filename: "future_preds_all.parquet"
      validate_no_overlap: true
      save_fig: true
