---
task:
  mode: train
  type: regression
  label_col: y
  seed: 42
logging:
  level: INFO
  log_dir: "{run_dir}/logs/train"
  filename: train.log
  max_bytes: 10485760
  backup_count: 100
  fmt: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  datefmt: "%Y-%m-%d %H:%M:%S"
  console: true
paths:
  runs_root: "/home/quant/projects/ret_pred/runs"
  run_id: exp_rankic_refit_2024_2026_y_rank_pca80
  run_dir: "{runs_root}/{run_id}"
  preprocess_dir: "{run_dir}/preprocess"
  model_dir: "{run_dir}/model"
  pred_dir: "{run_dir}/preds"
  eval_dir: "{run_dir}/eval"
dataloader:
  source: parquet_dir
  date_col: date
  stockid_col: stockid
  long_paths:
  - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_0_100.parquet"
  - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_100_200.parquet"
  - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_200_300.parquet"
  - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_300_400.parquet"
  - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_400_500.parquet"
  - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_500_600.parquet"
  - "/home/quant/projects/factors_2021_2026_from_predictions/tmp_parquet_chunks/chunk_600_700.parquet"
  long_merge_how: inner
  lowmem:
    enabled: true
    chunk_days: 20
    cast_float32: true
    temp_dir: "{run_dir}/tmp_dataloader"
    output_path: "{run_dir}/tmp_dataloader/merged_long.parquet"
  fields: []
  label_name: y
  date_start: '2024-01-04'
  date_end: '2026-02-27'
  feature_mask_csv: 
  feature_col_name: feature
  feature_use_col: use
  build_label: true
  label_price_col: open_1d
  label_log_return: false
  label_postprocess:
    enabled: true
    keep_y_raw: true
    rank_by_date:
      enabled: true
      pct: true
      centered: false
      ties_method: average
      na_option: keep
    zscore_by_date:
      enabled: false
      ddof: 0
      eps: 1.0e-12
      clip:
      - -5
      - 5
    winsorize_by_date:
      enabled: false
      lower_q: 0.05
      upper_q: 0.95
feature_engineering:
  enabled: false
  rolling_stats:
    enabled: true
    windows:
    - 5
    - 10
    - 20
    stats:
    - mean
    - std
    min_periods: 1
preprocess:
  date_col: date
  stockid_col: stockid
  label_col: y
  col_drop_threshold: 1.01
  row_drop_threshold: 0.2
  nan_policy: tree_friendly
  do_fill_for_tree: false
  fill_method: ffill_then_zero
  ffill_limit: 5
  add_missing_mask: false
  winsorize:
    enabled: true
    by: date
    lower_q: 0.01
    upper_q: 0.99
  zscore:
    enabled: true
    by: date
    method: standard
    ddof: 0
    clip: 
    robust:
      eps: 1.0e-12
      use_06745: false
  save_parquet: true
  save_path: "{preprocess_dir}/preprocessed_{mode}_{label}_{date_start}_{date_end}.parquet"
  save_state_json: true
  state_path: "{model_dir}/preprocess_state_fit_{label}_{date_start}_{date_end}.json"
  chunked:
    enabled: true
    chunk_days: 20
    nan_scan_block_size: 64
    cast_float32: true
datacutting:
  date_col: date
  stockid_col: stockid
  label_col: y
  weight_col: 
  feature_cols: 
  return_dataframe_X: true
  cache:
    enabled: false
    mode: parquet_long
    dir: "{run_dir}/cut"
    file_tpl: "{model}_{part}_fold{fold}.parquet"
    meta_tpl: "{model}_{part}_fold{fold}_meta.json"
    npz_tpl: "{model}_{part}_fold{fold}.npz"
    keys_tpl: "{model}_{part}_fold{fold}_keys.parquet"
  seq_len: 60
  incomplete_policy: drop
  pad_side: left
  min_len_to_keep: 1
  return_mask: true
  mask_dtype: bool
  strict_check_nan: false
model:
  family: tree
  name: lgbm
  candidates:
    lgbm:
      verbosity: -1
      objective: regression
      n_estimators: 800
      learning_rate: 0.05
      num_leaves: 63
      max_depth: -1
      min_data_in_leaf: 200
      feature_fraction: 0.8
      bagging_fraction: 0.8
      bagging_freq: 1
      lambda_l1: 0.0
      lambda_l2: 1.0
      min_gain_to_split: 0.0
      random_state: 42
      n_jobs: -1
trainer:
  name: sweep_rankic_refit_roll
  params:
    metric: rankic
    maximize: true
    device: cpu
    windowing:
      mode: days
      initial_train_days: 15
      eval_test_days: 3
      prediction_horizon_days: 1
      step_days: 
      expanding_train: true
      max_train_days: 
    factor_selection:
      enabled: true
      preplan_union_to_dataloader: true
      selection_mode: single_day_threshold
      train_test_anchor: train_start
      future_anchor: future_start
      future_reselect: true
      predictions_pkl_path: "/home/quant/projects/predictions.pkl"
      rankic_threshold: 0.03
      empty_selection_policy: fallback_base_pool
    sample_weighting:
      enabled: true
      recency:
        enabled: true
        mode: exp
        half_life_days: 63
        min_weight: 0.2
        max_weight: 1.0
      tail_y:
        enabled: true
        side: both
        scope: date
        lower_q: 0.1
        upper_q: 0.9
        tail_weight: 2.0
        mid_weight: 1.0
      combine: multiply
      normalize: mean1
    saver:
      enabled: true
      params:
        dir: "{pred_dir}"
        save_parts:
        - train
        - test
        - future
        file_tpl: window{fold:04d}_{part}.parquet
    pca:
      enabled: true
      explained_variance_ratio: 0.8
      standardize: true
      whiten: false
      svd_solver: auto
      random_state: 42
    pseudo_classification:
      enabled: false
sweep:
  id_prefix: lgbm
  merge_with_base: true
  param_sets:
  - id: lgbm_04
    model:
      family: tree
      name: lgbm
      params:
        learning_rate: 0.05
        n_estimators: 1200
        num_leaves: 63
        max_depth: 4
        min_data_in_leaf: 200
        feature_fraction: 0.8
        bagging_fraction: 0.8
        bagging_freq: 1
        lambda_l2: 1.0
        min_gain_to_split: 0.0
  - id: lgbm_05
    model:
      family: tree
      name: lgbm
      params:
        learning_rate: 0.01
        n_estimators: 4000
        num_leaves: 63
        max_depth: -1
        min_data_in_leaf: 200
        feature_fraction: 0.8
        bagging_fraction: 0.8
        bagging_freq: 1
        lambda_l2: 1.0
        min_gain_to_split: 0.0
evaluate:
  params:
    task: regression
    pred_dir: "{pred_dir}"
    out_dir: "{eval_dir}"
    parts:
    - train
    - test
    - future
    date_col: date
    stockid_col: stockid
    load_cast_float32: true
    load_part_as_category: true
    plot_max_rows: 300000
    plot_sample_seed: 42
    future_concat:
      enabled: true
      future_part: future
      out_subdir: future
      preds_filename: future_preds_all.parquet
      validate_no_overlap: true
      save_fig: true
    factor_eval:
      enabled: true
      strategy: rankic_refit_roll
      input_source: auto
      value_col: y_pred
      out_dir: "{eval_dir}/factor_eval_{strategy}_{source_tag}"
      source_tag: future_preds
      excess_mode: both
      excess_output_layout: separate_dirs
      meta_filename: factor_eval_meta.json
      analysis_params:
        factor_name: pred_future
        start_date: '2024-01-01'
        end_date: '2026-03-01'
        frequency: 1
        factor_direction: positive
        portfolio_type: long_only
        long_groups:
        - 9
        - 10
        short_groups:
        - 1
        - 2
        group_num: 10
        neutralize: false
        save_figures: true
        return_data: true
        verbose: true
        enable_turnover_fee: true
        turnover_fee_rate: 0.00045
        eval_price: open
