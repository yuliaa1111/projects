evaluate:
  name: "default"
  params:
    task: "regression"
    pred_dir: "{pred_dir}"
    out_dir: "{eval_dir}"
    save_fig: true
    parts: ["train", "test"]         # 去掉 valid
    date_col: "date"
    daily_agg: "mean"
    q_bins: 10
    regression:
      metrics: ["rankic", "icir", "mse", "mae", "r2"]
      ic_method: "spearman"
    max_files: null
    return_pred_df: false
    stitch_regression: true
    stitch_keep_individual: true
    stitch_filename: "regression_all_plots_long.png"


sweep_compare:
  enabled: true
  summary_path: "{run_dir}/sweeps/sweep_summary.parquet"
  out_dir: "{eval_dir}/sweep_compare"
  # 每张 long 图有多少个 panel（目前是8）
  n_panels: 8
  # 要对比的 panel 索引
  # 0=train quantile
  # 1=test quantile
  # 2=mean return by quantile
  # 3=rankic distribution
  # 4=residual distribution
  # 5=residual daily
  # 6=scatter
  # 7=daily true vs pred
  panel_idxs: [1,2,3,6]
  sort_by: "rankic"    # 排序指标（test 部分）
  make_metric_bar: true      # 生成柱状图
  make_panel_compare: true   # 拼接图


post_train_predict:
  enabled: false                    
  asof_date: "2024-06-14"
  target_date: "2024-06-17"
  out_path: "{pred_dir}_infer/pred_{target_date}.parquet"
